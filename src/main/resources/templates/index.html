<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 th:text="${vision.contentValue}">미래를 향한 끊임없는 도전</h1>
            <p>교육의 가치를 기술로 실현하는 미래위즈입니다.</p>
            <a href="/programs" class="btn-primary">프로그램 둘러보기</a>
        </div>
    </section>

    <!-- Program Gallery -->
    <section>
        <div class="container">
            <h2 class="section-title">주요 서비스 및 앱 스크린샷</h2>
            <div class="gallery">
                <!-- Loop through all 37 images -->
                <div class="gallery-item" th:each="i : ${#numbers.sequence(1, 37)}">
                    <img th:src="@{'/images/ref/' + ${#numbers.formatInteger(i, 2)} + ${i == 3 or i == 5 or i == 7 or i == 12 or i == 16 or i == 18 or i == 26 or i == 28 or i == 30 ? '.jpg' : '.png'}}" alt="Screenshot">
                </div>
            </div>
        </div>
    </section>

    <!-- Programs Summary -->
    <section style="background: var(--bg-light);">
        <div class="container">
            <h2 class="section-title">미래위즈 프로그램</h2>
            <div class="card-grid">
                <div class="card" th:each="program : ${programs}" style="text-align: center;">
                    <img th:src="${program.iconUrl}" class="app-icon" alt="App Icon">
                    <h3 th:text="${program.title}">프로그램 제목</h3>
                    <p th:text="${program.description}">프로그램 설명</p>
                    <a th:href="@{/programs}" style="color: var(--primary-color); font-weight: bold;">자세히 보기 &rarr;</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Review Highlight -->
    <section style="background: var(--bg-light);">
        <div class="container">
            <h2>사용자 후기</h2>
            <div class="card-grid">
                <div class="card" th:each="review : ${bestReviews}">
                    <p th:text="'&ldquo;' + ${review.content} + '&rdquo;'">후기 내용</p>
                    <div style="margin-top: 1rem; font-weight: bold;">
                        <span th:text="${review.author}">작성자</span>
                        <span style="color: #ffc107;"> ★★★★★</span>
                    </div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 3rem;">
                <a href="/reviews" style="text-decoration: underline;">전체 후기 보기</a>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
