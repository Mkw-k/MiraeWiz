<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main>
    <!-- Native HTML/CSS Replication of the Mockup Image -->
    <section class="hero">
        <div class="container hero-inner">
            <div class="hero-text-box">
                <span class="hero-badge">중등 필수 어휘 정복</span>
                
                <h1>수업보다 더 손이가는<br><span class="highlight">나만의 앱 단어장!</span></h1>
                
                <p>딱딱한 암기는 이제그만.<br>WW Kingdom에서 당신만의 영단어 왕국을 건설하고 실력을 레벨업하세요.</p>
                
                <a href="https://play.google.com/store/apps/details?id=com.miraewiz.eng_middle_word_basic" target="_blank" class="google-play-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" alt="Google Play Icon">
                    <div class="google-play-text">
                        <span>Google Play에서</span>
                        <span>다운로드</span>
                    </div>
                </a>
            </div>
            
            <div class="hero-mockup">
                <div class="phone-frame">
                    <img src="/images/ref/01.png" alt="WW Kingdom App Screen">
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const slides = document.querySelectorAll('.carousel-slide');
        const indicators = document.querySelectorAll('.indicator');
        let currentSlide = 0;
        let slideInterval;

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            indicators.forEach(ind => ind.classList.remove('active'));
            
            slides[index].classList.add('active');
            indicators[index].classList.add('active');
            currentSlide = index;
        }

        function nextSlide() {
            let next = (currentSlide + 1) % slides.length;
            showSlide(next);
        }

        function startSlideShow() {
            if(slides.length > 1) {
                slideInterval = setInterval(nextSlide, 5000);
            }
        }

        function stopSlideShow() {
            clearInterval(slideInterval);
        }

        indicators.forEach(indicator => {
            indicator.addEventListener('click', (e) => {
                const index = parseInt(e.target.getAttribute('data-index'));
                stopSlideShow();
                showSlide(index);
                startSlideShow();
            });
        });

        startSlideShow();
    });
</script>

</body>
</html>
}"></footer>

</body>
</html>
