<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="faq-page-wrap">
    <div class="container" style="max-width: 800px;">
        <div class="faq-header-wrap">
            <h2 class="faq-title">자주하는 질문</h2>
        </div>
        
        <div class="faq-category-tabs">
            <button class="faq-tab active">전체</button>
            <button class="faq-tab">서비스</button>
            <button class="faq-tab">이용안내</button>
            <button class="faq-tab">기술문의</button>
        </div>

        <div class="faq-list">
            <div class="faq-item" th:each="faq : ${faqs}" th:data-category="${faq.category}">
                <div class="faq-question">
                    <span th:text="${faq.question}">질문입니다.</span>
                    <span class="faq-toggle-icon">▼</span>
                </div>
                <div class="faq-answer">
                    <div class="faq-answer-inner">
                        <p th:text="${faq.answer}" style="white-space: pre-wrap;">답변입니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Accordion Logic
        const faqItems = document.querySelectorAll('.faq-item');
        faqItems.forEach(item => {
            const question = item.querySelector('.faq-question');
            const answer = item.querySelector('.faq-answer');

            question.addEventListener('click', () => {
                const isActive = item.classList.contains('active');
                
                // Close all
                document.querySelectorAll('.faq-item').forEach(otherItem => {
                    otherItem.classList.remove('active');
                    otherItem.querySelector('.faq-answer').style.maxHeight = null;
                });

                // Toggle current
                if (!isActive) {
                    item.classList.add('active');
                    answer.style.maxHeight = answer.scrollHeight + "px";
                }
            });
        });

        // Tab Filtering Logic
        const tabs = document.querySelectorAll('.faq-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Update active tab styling
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const filter = tab.innerText.trim();
                
                // Filter items
                faqItems.forEach(item => {
                    if (filter === '전체' || item.getAttribute('data-category') === filter) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                        item.classList.remove('active'); // Close if hidden
                        item.querySelector('.faq-answer').style.maxHeight = null;
                    }
                });
            });
        });
    });
</script>

</body>
</html>
