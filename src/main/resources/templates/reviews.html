<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="container reviews-page-wrap">
    <div class="reviews-header">
        <h2 class="reviews-title">사용 후기</h2>
        <p class="reviews-subtitle">미래위즈 서비스를 이용한 분들의 소중한 이야기입니다.</p>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <!-- Review Form -->
    <div class="review-write-container">
        <h3 class="write-title">후기 남기기</h3>
        <form th:action="@{/reviews/write}" method="post">
            <div class="form-row">
                <input type="text" name="author" placeholder="닉네임" required class="form-input">
                <input type="password" name="password" placeholder="비밀번호" required class="form-input">
            </div>
            <textarea name="content" placeholder="솔직한 후기를 남겨주세요." required class="form-textarea"></textarea>
            <div class="form-rating-row">
                <label class="rating-label">평점: </label>
                <select name="rating" class="rating-select">
                    <option value="5">★★★★★</option>
                    <option value="4">★★★★☆</option>
                    <option value="3">★★★☆☆</option>
                    <option value="2">★★☆☆☆</option>
                    <option value="1">★☆☆☆☆</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">등록하기</button>
        </form>
    </div>

    <!-- Review List -->
    <div class="review-grid">
        <div class="review-card" th:each="review : ${reviews}">
            <div class="card-header">
                <span th:text="${review.author}" class="card-author">작성자</span>
                <span class="card-rating" th:text="${'★'.repeat(review.rating) + '☆'.repeat(5-review.rating)}">★★★★★</span>
            </div>
            <p th:text="${review.content}" class="card-content">내용</p>
            <div class="card-footer">
                <span th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd')}" class="card-date">2026.06.18</span>
                <div class="card-actions">
                    <span th:if="${review.isBest}" class="best-badge">BEST</span>
                    <button th:onclick="'showEditForm(' + ${review.id} + ')'" class="action-btn edit-btn">수정</button>
                    <button th:onclick="'showDeleteForm(' + ${review.id} + ')'" class="action-btn delete-btn">삭제</button>
                </div>
            </div>
            <!-- Hidden Edit Form -->
            <div th:id="'edit-form-' + ${review.id}" class="edit-form-container">
                <form th:action="@{/reviews/update}" method="post">
                    <input type="hidden" name="id" th:value="${review.id}">
                    <div class="edit-rating-row">
                        <label class="edit-rating-label">평점: </label>
                        <select name="rating" class="edit-rating-select">
                            <option value="5" th:selected="${review.rating == 5}">★★★★★</option>
                            <option value="4" th:selected="${review.rating == 4}">★★★★☆</option>
                            <option value="3" th:selected="${review.rating == 3}">★★★☆☆</option>
                            <option value="2" th:selected="${review.rating == 2}">★★☆☆☆</option>
                            <option value="1" th:selected="${review.rating == 1}">★☆☆☆☆</option>
                        </select>
                    </div>
                    <textarea name="content" required class="edit-textarea" th:text="${review.content}"></textarea>
                    <div class="edit-action-row">
                        <input type="password" name="password" placeholder="비밀번호" required class="edit-pwd-input">
                        <button type="submit" class="edit-submit-btn">수정 완료</button>
                        <button type="button" th:onclick="'hideEditForm(' + ${review.id} + ')'" class="edit-cancel-btn">취소</button>
                    </div>
                </form>
            </div>
            <!-- Hidden Delete Form -->
            <div th:id="'delete-form-' + ${review.id}" class="delete-form-container">
                <form th:action="@{/reviews/delete}" method="post" class="delete-form">
                    <input type="hidden" name="id" th:value="${review.id}">
                    <input type="password" name="password" placeholder="비밀번호" required class="delete-pwd-input">
                    <button type="submit" class="delete-submit-btn">확인</button>
                    <button type="button" th:onclick="'hideDeleteForm(' + ${review.id} + ')'" class="delete-cancel-btn">취소</button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Pagination -->
    <div class="pagination" th:if="${totalPages > 0}">
        <a th:href="@{/reviews(page=${i})}" th:each="i : ${#numbers.sequence(1, totalPages)}" 
           class="page-item" th:classappend="${i == currentPage} ? 'active' : ''" th:text="${i}">1</a>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    function showEditForm(id) {
        hideDeleteForm(id);
        const form = document.getElementById('edit-form-' + id);
        const card = form.closest('.review-card');
        if (card) {
            card.style.height = 'auto';
            card.style.maxHeight = 'none';
        }
        form.style.display = 'block';
    }
    function hideEditForm(id) {
        const form = document.getElementById('edit-form-' + id);
        const card = form.closest('.review-card');
        if (card) {
            card.style.height = '320px';
            card.style.maxHeight = '320px';
        }
        form.style.display = 'none';
    }
    function showDeleteForm(id) {
        hideEditForm(id);
        const form = document.getElementById('delete-form-' + id);
        const card = form.closest('.review-card');
        if (card) {
            card.style.height = 'auto';
            card.style.maxHeight = 'none';
        }
        form.style.display = 'block';
    }
    function hideDeleteForm(id) {
        const form = document.getElementById('delete-form-' + id);
        const card = form.closest('.review-card');
        if (card) {
            card.style.height = '320px';
            card.style.maxHeight = '320px';
        }
        form.style.display = 'none';
    }
</script>

</body>
</html>
