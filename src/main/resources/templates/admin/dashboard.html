<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - MiraeWiz</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #333; color: white; padding: 1rem; }
        .content { flex: 1; padding: 2rem; background: #f9f9f9; }
        nav ul { list-style: none; padding: 0; }
        nav li { margin-bottom: 1rem; }
        nav a { color: white; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>MiraeWiz Admin</h3>
        <nav>
            <ul>
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/reviews">Reviews</a></li>
                <li><a href="/admin/faq">FAQ</a></li>
                <li><a href="/admin/content">Site Content</a></li>
                <li>
                    <form th:action="@{/admin/logout}" method="post">
                        <button type="submit" style="background: none; border: none; color: white; cursor: pointer; padding: 0; font-size: 1rem;">Logout</button>
                    </form>
                </li>
            </ul>
        </nav>
    </div>
    <div class="content">
        <div class="header">
            <h1>Dashboard</h1>
            <span>Welcome, Admin</span>
        </div>
        <p>Select a menu to manage site content.</p>
    </div>
</body>
</html>
