<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main>
    <!-- About Hero -->
    <section class="about-hero">
        <div class="container">
            <h1 th:text="${vision?.contentValue ?: '미래를 향한 끊임없는 도전'}">미래를 향한 끊임없는 도전</h1>
            <p th:text="${greeting?.contentValue ?: '안녕하세요. 미래위즈입니다. 우리는 교육의 가치를 기술로 실현합니다.'}">안녕하세요. 미래위즈입니다. 우리는 교육의 가치를 기술로 실현합니다.</p>
        </div>
    </section>

    <!-- Stats Section (Like Vocatrain) -->
    <section style="background: #f8f9fa; padding-bottom: 100px;">
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3><span class="counter" data-target="100">0</span>+</h3>
                    <p>누적 학교/학원</p>
                </div>
                <div class="stat-card">
                    <h3><span class="counter" data-target="50">0</span>K+</h3>
                    <p>누적 학습자</p>
                </div>
                <div class="stat-card">
                    <h3><span class="counter" data-target="10">0</span>K+</h3>
                    <p>필수 영단어 DB</p>
                </div>
                <div class="stat-card">
                    <h3><span class="counter" data-target="2025">0</span></h3>
                    <p>플랫폼 런칭</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Brand Story & History -->
    <section class="about-content-section container">
        <div style="display: flex; gap: 80px;">
            <div style="flex: 1;">
                <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 20px;">미래위즈가 그리는<br>교육의 미래</h2>
                <p style="color: #666; line-height: 1.8; margin-bottom: 30px;">
                    우리는 단순한 암기가 언어의 본질을 담을 수 없다고 믿습니다.<br>
                    학습자가 매일 조금씩, 즐겁게 성장할 수 있도록 돕는 것이 미래위즈의 사명입니다.<br><br>
                    WW Kingdom은 그 첫 번째 발걸음입니다.
                </p>
            </div>
            <div style="flex: 1;">
                <h3 style="font-size: 24px; margin-bottom: 30px; color: var(--primary-blue);">History</h3>
                <div class="history-box">
                    <p th:utext="${#strings.replace(#strings.replace(history?.contentValue ?: '2025.01 미래위즈 설립<br>2025.06 WW Kingdom 출시', '\n', '<br>'), '\\n', '<br>')}" style="line-height: 2.5; color: #444; font-weight: 500;">
                    </p>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const counters = document.querySelectorAll('.counter');
        const speed = 200; // Animation speed

        const animateCounters = () => {
            counters.forEach(counter => {
                const updateCount = () => {
                    const target = +counter.getAttribute('data-target');
                    const count = +counter.innerText;
                    
                    const inc = target / speed;

                    if (count < target) {
                        counter.innerText = Math.ceil(count + inc);
                        setTimeout(updateCount, 10);
                    } else {
                        counter.innerText = target;
                    }
                };
                updateCount();
            });
        };

        // Trigger animation when scrolled into view
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    animateCounters();
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        const statsSection = document.querySelector('.stats-grid');
        if (statsSection) {
            observer.observe(statsSection);
        }
    });
</script>

</body>
</html>
