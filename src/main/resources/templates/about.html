<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="container" style="padding-top: 50px;">
    <section>
        <h2>회사소개</h2>
        <div style="text-align: center; max-width: 700px; margin: 0 auto;">
            <h3 style="color: var(--primary-color);">CEO 인사말</h3>
            <p th:text="${greeting.contentValue}" style="white-space: pre-wrap;">인사말 내용</p>
        </div>
    </section>

    <section style="background: var(--bg-light); border-radius: 20px;">
        <div class="container">
            <h2>회사 연혁</h2>
            <div style="max-width: 600px; margin: 0 auto;">
                <p th:text="${history.contentValue}" style="white-space: pre-wrap; line-height: 2;">연혁 내용</p>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
