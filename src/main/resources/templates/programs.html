<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<header th:replace="~{fragments :: header}"></header>

<main class="section-white">
    <div class="container">
        <div style="text-align: center; margin-bottom: 80px;">
            <p style="color: var(--primary-blue); font-weight: 700;">Education App</p>
            <h2 style="font-size: 48px; font-weight: 800; margin-top: 10px;">WW Kingdom</h2>
            <p style="font-size: 20px; color: var(--text-gray); margin-top: 20px;">중등 영단어 · 영어듣기를 한 번에 정복하는 최고의 방법</p>
        </div>

        <!-- Main Info -->
        <div class="app-showcase" style="margin-bottom: 100px;">
            <div class="app-visual">
                <img src="/images/ref/01.png" style="width: 300px; margin: 0 auto; display: block; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);" alt="App Icon">
            </div>
            <div class="app-text">
                <h3>가장 스마트한 영단어 정복</h3>
                <p>단어 외우기가 힘든 학생들을 위해 미래위즈가 만들었습니다. <br>게임처럼 레벨을 넘어가며 자연스럽게 뇌에 각인되는 학습법을 직접 경험해 보세요.</p>
                <div style="margin-top: 40px;">
                    <a href="https://play.google.com/store/apps/details?id=com.miraewiz.eng_middle_word_basic" class="cta-button">지금 무료로 시작하기</a>
                </div>
            </div>
        </div>

        <!-- The 37 Screenshots Gallery: This is where they belong -->
        <h3 class="title-center" style="font-size: 28px;">상세 스크린샷</h3>
            <div class="screenshot-item" th:each="i : ${#numbers.sequence(1, 37)}">
                <img th:src="@{'/images/ref/' + ${#numbers.formatInteger(i, 2)} + ${(i == 3 or i == 5 or i == 7 or i == 12) ? '.jpg' : '.png'}}" alt="App Screenshot">
            </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
